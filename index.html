<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Value Lab</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root {
      --bg1: #f3f0eb;
      --bg2: #eae5de;
      --panel: rgba(255,255,255,0.72);
      --line: rgba(0,0,0,0.08);
      --text: #111;
      --muted: rgba(17,17,17,0.56);
      --shadow: 0 20px 50px rgba(0,0,0,0.10);
      --radius: 26px;

      --node-grey-1: #ddd7cf;
      --node-grey-2: #cbc4bb;
      --node-grey-3: #eee8e0;

      --commons: #5f8788;
      --state: #6e4348;
      --market: #9a7a33;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 28%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.35), transparent 24%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
    }

    model-viewer {
      width: 100%;
      height: 62vh;
      min-height: 380px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.88) 0%, rgba(245,242,238,1) 70%);
      --ar-button-display: none;
    }

    .wrap {
      width: min(1320px, calc(100% - 28px));
      margin: 0 auto;
      padding: 14px 0 36px;
    }

    .glass {
      background: var(--panel);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.55);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .top {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .header {
      padding: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 48px);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .header p {
      margin: 8px 0 0;
      font-size: 14px;
      color: var(--muted);
      max-width: 540px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px;
      align-items: center;
    }

    .ar-btn, .add-btn, .send-btn, .ghost-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .ar-btn:hover, .add-btn:hover, .send-btn:hover, .ghost-btn:hover {
      transform: translateY(-1px);
    }

    .ar-btn, .add-btn, .send-btn {
      background: #111;
      color: #fff;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0,0,0,0.16);
    }

    .ghost-btn {
      background: rgba(255,255,255,0.72);
      color: #111;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .form-card {
      padding: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.8fr auto auto;
      gap: 10px;
      align-items: stretch;
    }

    .form-grid input,
    .form-grid select {
      width: 100%;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 18px;
      padding: 14px 16px;
      font-size: 14px;
      outline: none;
      background: rgba(255,255,255,0.86);
    }

    .status {
      display: none;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      padding: 0 4px;
    }

    .section {
      margin-top: 16px;
      padding: 16px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* 3D stage */
    .stage-wrap {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 16px;
      align-items: stretch;
    }

    .stage {
      position: relative;
      min-height: 760px;
      border-radius: 28px;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.18), transparent 40%),
        linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02)),
        rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.22);
      perspective: 1800px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.12), transparent 48%),
        radial-gradient(circle at 50% 78%, rgba(0,0,0,0.04), transparent 20%);
      pointer-events: none;
    }

    .orbit {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      animation: spin 26s linear infinite;
    }

    .orbit.paused {
      animation-play-state: paused;
    }

    @keyframes spin {
      from { transform: rotateX(18deg) rotateY(0deg); }
      to   { transform: rotateX(18deg) rotateY(360deg); }
    }

    .value-node {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 290px;
      min-height: 290px;
      transform-style: preserve-3d;
      margin-left: -145px;
      margin-top: -145px;
      border-radius: 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.32), transparent 26%),
        radial-gradient(circle at 80% 22%, rgba(255,255,255,0.22), transparent 22%),
        radial-gradient(circle at 50% 78%, rgba(255,255,255,0.18), transparent 28%),
        linear-gradient(180deg, var(--node-grey-1), var(--node-grey-2));
      border: 1px solid rgba(255,255,255,0.56);
      box-shadow:
        0 24px 44px rgba(0,0,0,0.12),
        inset 0 1px 0 rgba(255,255,255,0.35);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .value-node:hover {
      box-shadow:
        0 30px 54px rgba(0,0,0,0.16),
        inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .node-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .node-title {
      margin: 0;
      font-size: 28px;
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .node-count {
      min-width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: rgba(255,255,255,0.45);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.42);
    }

    .quote-stack {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .quote-chip {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 10px 13px;
      font-size: 12px;
      line-height: 1.25;
      text-align: left;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.14);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
      width: fit-content;
      max-width: 100%;
    }

    .quote-chip:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 12px 22px rgba(0,0,0,0.16);
    }

    .quote-chip small {
      display: block;
      margin-top: 4px;
      font-size: 10px;
      opacity: 0.88;
    }

    .commons { background: var(--commons); }
    .state { background: var(--state); }
    .market { background: var(--market); }
    .user-added {
      background: var(--commons);
      outline: 2px solid rgba(255,255,255,0.72);
      outline-offset: -2px;
    }

    .side-panel {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .side-panel h3 {
      margin: 0;
      font-size: 16px;
    }

    .side-panel p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    .legend {
      display: grid;
      gap: 10px;
      margin-top: 6px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .orbit-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,10,0.30);
      z-index: 100;
      padding: 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .overlay.show {
      display: flex;
    }

    .overlay-card {
      width: min(760px, 100%);
      background: rgba(255,255,255,0.94);
      border-radius: 30px;
      box-shadow: 0 28px 70px rgba(0,0,0,0.18);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.75);
    }

    .overlay-head {
      padding: 18px 20px;
      background: linear-gradient(180deg, #d8d3cb, #cbc5bc);
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .overlay-head h3 {
      margin: 0;
      font-size: 28px;
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: #111;
    }

    .close-btn {
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.55);
      color: #111;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .overlay-body {
      padding: 22px 20px 24px;
    }

    .overlay-quote {
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.18;
      margin: 0 0 16px;
      color: #111;
      letter-spacing: -0.03em;
      max-width: 18ch;
    }

    .overlay-meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
    }

    @media (max-width: 1100px) {
      .stage-wrap {
        grid-template-columns: 1fr;
      }

      .stage {
        min-height: 660px;
      }

      .side-panel {
        order: -1;
      }
    }

    @media (max-width: 760px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      model-viewer {
        height: 56vh;
        min-height: 340px;
      }

      .stage {
        min-height: 560px;
      }

      .value-node {
        width: 230px;
        min-height: 250px;
        margin-left: -115px;
        margin-top: -125px;
      }

      .node-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    src="./model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    scale="0.01 0.01 0.01"
    alt="Value Lab 3D model">
  </model-viewer>

  <div class="wrap">
    <div class="top">
      <div class="glass header">
        <div>
          <h1>Value Lab</h1>
          <p>Spin the values. Tap the quotes. Open the model in AR.</p>
        </div>
      </div>

      <div class="glass controls">
        <button class="ar-btn" id="arButton" type="button">View in AR</button>
        <button class="ghost-btn" id="toggleSpinButton" type="button">Pause Spin</button>
        <button class="ghost-btn" id="clearNodesButton" type="button">Clear Added Quotes</button>
      </div>

      <div class="glass form-card">
        <form id="nodeForm" class="form-grid">
          <input
            type="text"
            id="nodeInput"
            name="message"
            placeholder="Add a quote..."
            required
          />
          <select id="valueSelect" name="value" required>
            <option value="care">Care</option>
            <option value="belonging">Belonging</option>
            <option value="neglect">Neglect</option>
            <option value="greed">Greed</option>
            <option value="trust">Trust</option>
            <option value="efficiency">Efficiency</option>
          </select>
          <button class="add-btn" type="submit">Add</button>
          <button class="send-btn" type="button" id="sendFormspreeButton">Send</button>
        </form>
        <div class="status" id="statusMessage"></div>
      </div>
    </div>

    <div class="glass section">
      <h2>3D Value Nodes</h2>
      <div class="stage-wrap">
        <div class="stage">
          <div class="orbit" id="orbit"></div>
        </div>

        <div class="glass side-panel">
          <h3>Systems</h3>
          <div class="legend">
            <div class="legend-item">
              <span class="legend-dot" style="background:var(--commons)"></span>
              <span>Commons / added quotes</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:var(--state)"></span>
              <span>State</span>
            </div>
            <div class="legend-item">
              <span class="legend-dot" style="background:var(--market)"></span>
              <span>Market</span>
            </div>
          </div>

          <p>Quotes can repeat across values. That overlap stays visible.</p>

          <div class="orbit-controls">
            <button class="ghost-btn" id="focusCare" type="button">Care</button>
            <button class="ghost-btn" id="focusBelonging" type="button">Belonging</button>
            <button class="ghost-btn" id="focusNeglect" type="button">Neglect</button>
            <button class="ghost-btn" id="focusGreed" type="button">Greed</button>
            <button class="ghost-btn" id="focusTrust" type="button">Trust</button>
            <button class="ghost-btn" id="focusEfficiency" type="button">Efficiency</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="overlay-head">
        <div>
          <h3 id="overlayTitle">Node</h3>
        </div>
        <button class="close-btn" id="closeOverlay" type="button">Close</button>
      </div>
      <div class="overlay-body">
        <p class="overlay-quote" id="overlayText"></p>
        <div class="overlay-meta" id="overlayMeta"></div>
      </div>
    </div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const arButton = document.getElementById('arButton');
    const nodeForm = document.getElementById('nodeForm');
    const nodeInput = document.getElementById('nodeInput');
    const valueSelect = document.getElementById('valueSelect');
    const sendFormspreeButton = document.getElementById('sendFormspreeButton');
    const clearNodesButton = document.getElementById('clearNodesButton');
    const toggleSpinButton = document.getElementById('toggleSpinButton');
    const statusMessage = document.getElementById('statusMessage');
    const orbit = document.getElementById('orbit');

    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlayText = document.getElementById('overlayText');
    const overlayMeta = document.getElementById('overlayMeta');
    const closeOverlay = document.getElementById('closeOverlay');

    const STORAGE_KEY = 'value-lab-overlap-nodes-v3d';

    const valueMaps = [
      {
        id: 'care',
        title: 'Care',
        quotes: [
          { text: 'The bowling alley gave people somewhere to go.', system: 'commons' },
          { text: 'There should be more affordable food places here.', system: 'market' },
          { text: 'Fireworks should not be going off in the woodland.', system: 'market' },
          { text: 'There should be more places for kids to feel safer.', system: 'state' },
          { text: 'We need more places for young people to go.', system: 'commons' }
        ]
      },
      {
        id: 'belonging',
        title: 'Belonging',
        quotes: [
          { text: 'The trees in the area has been taken over.', system: 'state' },
          { text: 'Some businesses here are too expensive for local people.', system: 'state' },
          { text: 'If it feels good now because it is quiet, but I do not know what it will become.', system: 'commons' },
          { text: 'Young people need their own spaces.', system: 'commons' },
          { text: 'The bowling alley gave people a good place to go.', system: 'commons' }
        ]
      },
      {
        id: 'neglect',
        title: 'Neglect',
        quotes: [
          { text: 'The cinema used to be there.', system: 'commons' },
          { text: 'The swimming pool should be opened properly.', system: 'commons' },
          { text: 'They told us the buildings would not go that high.', system: 'market' },
          { text: 'I was asked to pay £1500 to get a driving licence.', system: 'market' },
          { text: 'It is turning into a concrete jungle.', system: 'state' },
          { text: 'The high-rises are too much now.', system: 'state' }
        ]
      },
      {
        id: 'greed',
        title: 'Greed',
        quotes: [
          { text: 'The high-rises has got too much now.', system: 'state' },
          { text: 'It is turning into a concrete jungle.', system: 'state' },
          { text: 'They are taking away our hidden gem.', system: 'state' },
          { text: 'The sustainability is an excuse to build more.', system: 'state' },
          { text: 'Some businesses here are too expensive for local people.', system: 'state' }
        ]
      },
      {
        id: 'trust',
        title: 'Trust',
        quotes: [
          { text: 'What are you doing here and why?', system: 'commons' },
          { text: 'If it feels good now because it is quiet, but I do not know what it will become.', system: 'commons' },
          { text: 'They told us the buildings would not go that high.', system: 'market' },
          { text: 'Fireworks should not be going off in the woodland.', system: 'market' },
          { text: 'I was asked to pay £4000 to become a councillor.', system: 'state' },
          { text: 'They use sustainability as an excuse to build more.', system: 'state' }
        ]
      },
      {
        id: 'efficiency',
        title: 'Efficiency',
        quotes: [
          { text: 'The market was so small and rubbish.', system: 'commons' },
          { text: 'The swimming pool should be fixed properly.', system: 'commons' },
          { text: 'There should be more affordable food places here.', system: 'state' },
          { text: 'There needs to be more indoor places to use in winter.', system: 'market' },
          { text: 'It was impossible after their car went to McDonald’s and came back while nothing had moved.', system: 'market' },
          { text: 'Schools.', system: 'market' }
        ]
      }
    ];

    let isPaused = false;

    function showStatus(text) {
      statusMessage.style.display = 'block';
      statusMessage.textContent = text;
      setTimeout(() => {
        statusMessage.style.display = 'none';
      }, 2600);
    }

    function getUserNodes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveUserNodes(nodes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes));
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString();
    }

    function sharedQuoteCount(text) {
      const all = valueMaps.flatMap(v => v.quotes.map(q => q.text));
      return all.filter(q => q === text).length;
    }

    function openNode(title, text, meta) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      overlayMeta.textContent = meta;
      overlay.classList.add('show');
    }

    closeOverlay.addEventListener('click', () => {
      overlay.classList.remove('show');
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('show');
    });

    function render3DNodes() {
      const userNodes = getUserNodes();
      const radius = 360;

      orbit.innerHTML = valueMaps.map((value, index) => {
        const angle = index * (360 / valueMaps.length);
        const valueUserNodes = userNodes.filter(node => node.value === value.id);
        const chips = [
          ...value.quotes.map(q => ({
            text: q.text,
            system: q.system,
            kind: 'quote'
          })),
          ...valueUserNodes.map(q => ({
            text: q.text,
            system: 'user-added',
            kind: 'user',
            createdAt: q.createdAt
          }))
        ];

        return `
          <div
            class="value-node"
            id="node-${value.id}"
            style="transform:
              rotateY(${angle}deg)
              translateZ(${radius}px)
              rotateX(-8deg);"
          >
            <div class="node-head">
              <h3 class="node-title">${value.title}</h3>
              <div class="node-count">${chips.length}</div>
            </div>
            <div class="quote-stack">
              ${chips.map(chip => `
                <button
                  class="quote-chip ${chip.system}"
                  type="button"
                  data-title="${value.title}"
                  data-text="${chip.text.replace(/"/g, '&quot;')}"
                  data-meta="${
                    chip.kind === 'user'
                      ? `Added quote • ${formatDate(chip.createdAt)}`
                      : sharedQuoteCount(chip.text) > 1
                        ? `Shared across value nodes`
                        : `Single value quote`
                  }"
                >
                  ${chip.text}
                  <small>${
                    chip.kind === 'user'
                      ? 'Added'
                      : sharedQuoteCount(chip.text) > 1
                        ? 'Shared'
                        : 'Quote'
                  }</small>
                </button>
              `).join('')}
            </div>
          </div>
        `;
      }).join('');

      orbit.querySelectorAll('.quote-chip').forEach(button => {
        button.addEventListener('click', (e) => {
          e.stopPropagation();
          openNode(
            button.dataset.title,
            button.dataset.text,
            button.dataset.meta
          );
        });
      });
    }

    function focusValue(index) {
      const step = 360 / valueMaps.length;
      const target = -(index * step);
      orbit.style.animation = 'none';
      orbit.style.transform = `rotateX(18deg) rotateY(${target}deg)`;
      requestAnimationFrame(() => {
        if (!isPaused) {
          orbit.style.animation = '';
        }
      });
    }

    arButton.addEventListener('click', async () => {
      try {
        if (viewer.activateAR) await viewer.activateAR();
      } catch {
        showStatus('AR could not open.');
      }
    });

    toggleSpinButton.addEventListener('click', () => {
      isPaused = !isPaused;
      orbit.classList.toggle('paused', isPaused);
      toggleSpinButton.textContent = isPaused ? 'Resume Spin' : 'Pause Spin';
    });

    document.getElementById('focusCare').addEventListener('click', () => focusValue(0));
    document.getElementById('focusBelonging').addEventListener('click', () => focusValue(1));
    document.getElementById('focusNeglect').addEventListener('click', () => focusValue(2));
    document.getElementById('focusGreed').addEventListener('click', () => focusValue(3));
    document.getElementById('focusTrust').addEventListener('click', () => focusValue(4));
    document.getElementById('focusEfficiency').addEventListener('click', () => focusValue(5));

    nodeForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const text = nodeInput.value.trim();
      const value = valueSelect.value;
      if (!text) return;

      const nodes = getUserNodes();
      nodes.push({
        text,
        value,
        createdAt: new Date().toISOString()
      });

      saveUserNodes(nodes);
      nodeInput.value = '';
      render3DNodes();
      showStatus('Quote added.');
    });

    sendFormspreeButton.addEventListener('click', async () => {
      const text = nodeInput.value.trim();
      const value = valueSelect.value;

      if (!text) {
        showStatus('Write a quote first.');
        return;
      }

      sendFormspreeButton.disabled = true;
      sendFormspreeButton.textContent = 'Sending...';

      const formData = new FormData();
      formData.append('message', `[${value.toUpperCase()}] ${text}`);

      try {
        const response = await fetch('https://formspree.io/f/xwvwbgrg', {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          showStatus('Message sent.');
        } else {
          showStatus('Could not send.');
        }
      } catch {
        showStatus('Connection problem.');
      }

      sendFormspreeButton.disabled = false;
      sendFormspreeButton.textContent = 'Send';
    });

    clearNodesButton.addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      render3DNodes();
      showStatus('Added quotes cleared.');
    });

    render3DNodes();
  </script>
</body>
</html>
