<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Value Lab AR</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
    }

    model-viewer {
      width: 100%;
      height: 75vh;
      background: #ffffff;
    }

    .panel {
      position: fixed;
      bottom: 0;
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,0,0,0.08);
      display: flex;
      gap: 10px;
      box-sizing: border-box;
    }

    input {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid rgba(0,0,0,0.1);
      font-size: 14px;
    }

    button {
      padding: 14px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    .ar-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: black;
      color: white;
    }

    .send-btn {
      background: black;
      color: white;
    }

    .status {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #555;
    }
  </style>
</head>
<body>

  <model-viewer
    id="viewer"
    src="./model.glb?v=2"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    alt="3D Model">
  </model-viewer>

  <button class="ar-btn" id="arButton">View in AR</button>

  <div class="panel">
    <input id="textInput" type="text" placeholder="Add a thought..." />
    <button class="send-btn" id="sendBtn">Send</button>
  </div>

  <div class="status" id="status"></div>

  <script>
    const viewer = document.getElementById('viewer');
    const arButton = document.getElementById('arButton');
    const sendBtn = document.getElementById('sendBtn');
    const textInput = document.getElementById('textInput');
    const status = document.getElementById('status');

    const STORAGE_KEY = "value-lab-texts";

    function showStatus(msg) {
      status.textContent = msg;
      setTimeout(() => status.textContent = "", 2000);
    }

    arButton.addEventListener("click", async () => {
      try {
        if (viewer.activateAR) await viewer.activateAR();
      } catch {
        showStatus("AR not supported");
      }
    });

    sendBtn.addEventListener("click", async () => {
      const text = textInput.value.trim();
      if (!text) return;

      // Save locally
      const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      existing.push({
        text,
        time: new Date().toISOString()
      });
      localStorage.setItem(STORAGE_KEY, JSON.stringify(existing));

      // Send to Formspree (optional)
      try {
        const formData = new FormData();
        formData.append("message", text);

        await fetch("https://formspree.io/f/xwvwbgrg", {
          method: "POST",
          body: formData,
          headers: { "Accept": "application/json" }
        });

        showStatus("Sent");
      } catch {
        showStatus("Saved locally");
      }

      textInput.value = "";
    });
  </script>

</body>
</html>
