<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Value Lab</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root {
      --bg: #f3f3f3;
      --panel: rgba(255,255,255,0.95);
      --line: rgba(0,0,0,0.08);
      --text: #111;
      --muted: #666;
      --shadow: 0 10px 30px rgba(0,0,0,0.10);
      --radius: 16px;

      --care: #4f7c68;
      --belonging: #5f7d6d;
      --neglect: #9b7a32;
      --greed: #6e3a3a;
      --trust: #7b6332;
      --efficiency: #8a7a3a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    model-viewer {
      width: 100%;
      height: 68vh;
      min-height: 420px;
      background: #fff;
      --ar-button-display: none;
    }

    .wrap {
      width: min(1200px, calc(100% - 24px));
      margin: 0 auto;
      padding: 12px 0 32px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .top {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .header {
      padding: 16px 18px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }

    .ar-btn, .send-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #111;
      color: #fff;
      font-weight: 700;
    }

    .form-card {
      padding: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr auto auto;
      gap: 8px;
      align-items: stretch;
    }

    .form-grid input,
    .form-grid select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    .status {
      display: none;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .section {
      margin-top: 16px;
      padding: 14px;
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .value-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .value-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.88);
      overflow: hidden;
    }

    .value-head {
      padding: 12px 14px;
      color: white;
      font-weight: 700;
      font-size: 15px;
    }

    .value-body {
      padding: 14px;
    }

    .subheading {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .quote-list, .node-list {
      display: grid;
      gap: 8px;
    }

    .quote, .node {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.92);
      font-size: 13px;
      line-height: 1.45;
      color: #222;
    }

    .node-meta {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .empty {
      font-size: 13px;
      color: var(--muted);
      padding: 6px 0;
    }

    .clear-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: white;
      color: #111;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .value-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      model-viewer {
        height: 58vh;
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    src="./model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    scale="0.01 0.01 0.01"
    alt="Value Lab 3D model">
  </model-viewer>

  <div class="wrap">
    <div class="top">
      <div class="panel header">
        <h1>Value Lab</h1>
        <p>Explore the model in AR and add new nodes to the value maps by choosing a category and leaving a comment.</p>
      </div>

      <div class="panel controls">
        <button class="ar-btn" id="arButton" type="button">View in AR</button>
        <button class="clear-btn" id="clearNodesButton" type="button">Clear Added Nodes</button>
      </div>

      <div class="panel form-card">
        <form id="nodeForm" class="form-grid">
          <input
            type="text"
            id="nodeInput"
            name="message"
            placeholder="Add a new node or comment..."
            required
          />
          <select id="valueSelect" name="value" required>
            <option value="care">Care</option>
            <option value="belonging">Belonging</option>
            <option value="neglect">Neglect</option>
            <option value="greed">Greed</option>
            <option value="trust">Trust</option>
            <option value="efficiency">Efficiency</option>
          </select>
          <button class="send-btn" type="submit" id="addNodeButton">Add Node</button>
          <button class="send-btn" type="button" id="sendFormspreeButton">Send</button>
        </form>
        <div class="status" id="statusMessage"></div>
      </div>
    </div>

    <div class="panel section">
      <h2>Maps of Value</h2>
      <div class="value-grid" id="valueGrid"></div>
    </div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const arButton = document.getElementById('arButton');
    const nodeForm = document.getElementById('nodeForm');
    const nodeInput = document.getElementById('nodeInput');
    const valueSelect = document.getElementById('valueSelect');
    const addNodeButton = document.getElementById('addNodeButton');
    const sendFormspreeButton = document.getElementById('sendFormspreeButton');
    const clearNodesButton = document.getElementById('clearNodesButton');
    const statusMessage = document.getElementById('statusMessage');
    const valueGrid = document.getElementById('valueGrid');

    const STORAGE_KEY = 'value-lab-user-nodes-v1';

    const valueMaps = [
      {
        id: 'care',
        title: 'Care',
        color: 'var(--care)',
        quotes: [
          'There should be more affordable food places here.',
          'Fireworks should not be going off in the woodland.',
          'We need more places for young people to go.'
        ]
      },
      {
        id: 'belonging',
        title: 'Belonging',
        color: 'var(--belonging)',
        quotes: [
          'The bowling alley gave people a good place to go.',
          'The trees and the area has been taken over.',
          'Young people need their own spaces.'
        ]
      },
      {
        id: 'neglect',
        title: 'Neglect',
        color: 'var(--neglect)',
        quotes: [
          'The cinema used to bring us all together.',
          'They told us the buildings would not go that high.',
          'The swimming pool should be opened properly.'
        ]
      },
      {
        id: 'greed',
        title: 'Greed',
        color: 'var(--greed)',
        quotes: [
          'The high-rises has got too much now.',
          'It is turning into a concrete jungle.',
          'Some businesses here are too expensive for local people.'
        ]
      },
      {
        id: 'trust',
        title: 'Trust',
        color: 'var(--trust)',
        quotes: [
          'Fireworks should not be going off in the woodland.',
          'They told us the buildings would not go that high.',
          'What are you doing here and why?'
        ]
      },
      {
        id: 'efficiency',
        title: 'Efficiency',
        color: 'var(--efficiency)',
        quotes: [
          'There needs to be more indoor places to use in winter.',
          'There should be more affordable food places here.',
          'The swimming pool should be fixed properly.'
        ]
      }
    ];

    function showStatus(text) {
      statusMessage.style.display = 'block';
      statusMessage.textContent = text;
      setTimeout(() => {
        statusMessage.style.display = 'none';
      }, 3000);
    }

    function getUserNodes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveUserNodes(nodes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes));
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString();
    }

    function renderValueMaps() {
      const userNodes = getUserNodes();

      valueGrid.innerHTML = valueMaps.map(value => {
        const nodesForValue = userNodes.filter(node => node.value === value.id);

        return `
          <div class="value-card">
            <div class="value-head" style="background:${value.color}">
              ${value.title}
            </div>
            <div class="value-body">
              <div class="subheading">Chosen Quotes</div>
              <div class="quote-list">
                ${value.quotes.map(quote => `<div class="quote">${quote}</div>`).join('')}
              </div>

              <div class="subheading" style="margin-top:14px;">Added Nodes</div>
              <div class="node-list">
                ${
                  nodesForValue.length
                    ? nodesForValue.map(node => `
                      <div class="node">
                        ${node.text}
                        <span class="node-meta">Added ${formatDate(node.createdAt)}</span>
                      </div>
                    `).join('')
                    : `<div class="empty">No added nodes yet.</div>`
                }
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    arButton.addEventListener('click', async () => {
      try {
        if (viewer.activateAR) {
          await viewer.activateAR();
        }
      } catch (error) {
        showStatus('AR could not open on this device.');
      }
    });

    nodeForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const text = nodeInput.value.trim();
      const value = valueSelect.value;

      if (!text) return;

      const nodes = getUserNodes();
      nodes.push({
        text,
        value,
        createdAt: new Date().toISOString()
      });

      saveUserNodes(nodes);
      nodeInput.value = '';
      renderValueMaps();
      showStatus('Node added.');
    });

    sendFormspreeButton.addEventListener('click', async () => {
      const text = nodeInput.value.trim();
      const value = valueSelect.value;

      if (!text) {
        showStatus('Write a comment first.');
        return;
      }

      sendFormspreeButton.disabled = true;
      sendFormspreeButton.textContent = 'Sending...';

      const formData = new FormData();
      formData.append('message', `[${value.toUpperCase()}] ${text}`);

      try {
        const response = await fetch('https://formspree.io/f/xwvwbgrg', {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          showStatus('Message sent.');
        } else {
          showStatus('Could not send message.');
        }
      } catch (error) {
        showStatus('Connection problem.');
      }

      sendFormspreeButton.disabled = false;
      sendFormspreeButton.textContent = 'Send';
    });

    clearNodesButton.addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      renderValueMaps();
      showStatus('Added nodes cleared.');
    });

    renderValueMaps();
  </script>
</body>
</html>
