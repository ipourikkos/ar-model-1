<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Value Lab</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root {
      --bg: #f2f2f2;
      --panel: rgba(255,255,255,0.95);
      --line: rgba(0,0,0,0.08);
      --text: #111;
      --muted: #666;
      --shadow: 0 10px 30px rgba(0,0,0,0.10);
      --radius: 18px;

      --care: #4f7c68;
      --belonging: #5f7d6d;
      --neglect: #9b7a32;
      --greed: #6e3a3a;
      --trust: #7b6332;
      --efficiency: #8a7a3a;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    model-viewer {
      width: 100%;
      height: 64vh;
      min-height: 400px;
      background: #fff;
      --ar-button-display: none;
    }

    .wrap {
      width: min(1280px, calc(100% - 24px));
      margin: 0 auto;
      padding: 12px 0 32px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .top {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .header {
      padding: 16px 18px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }

    .ar-btn, .action-btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #111;
      color: #fff;
      font-weight: 700;
    }

    .ghost-btn {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #fff;
      color: #111;
    }

    .form-card {
      padding: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr auto auto;
      gap: 8px;
      align-items: stretch;
    }

    .form-grid input,
    .form-grid select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    .status {
      display: none;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .section {
      margin-top: 16px;
      padding: 14px;
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .value-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .value-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      background: rgba(255,255,255,0.92);
      position: relative;
    }

    .value-head {
      padding: 14px 16px;
      color: white;
    }

    .value-head h3 {
      margin: 0;
      font-size: 18px;
    }

    .value-head p {
      margin: 6px 0 0;
      font-size: 13px;
      line-height: 1.4;
      opacity: 0.92;
    }

    .value-body {
      padding: 14px;
    }

    .node-field {
      position: relative;
      min-height: 270px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background:
        radial-gradient(circle at 20% 20%, rgba(0,0,0,0.02), transparent 28%),
        radial-gradient(circle at 75% 30%, rgba(0,0,0,0.02), transparent 22%),
        radial-gradient(circle at 45% 75%, rgba(0,0,0,0.02), transparent 30%),
        rgba(255,255,255,0.72);
      overflow: hidden;
      padding: 10px;
    }

    .node {
      position: absolute;
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.3;
      text-align: left;
      cursor: pointer;
      color: #fff;
      box-shadow: 0 10px 18px rgba(0,0,0,0.14);
      max-width: 220px;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .node:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 16px 26px rgba(0,0,0,0.16);
    }

    .node.user {
      outline: 2px solid rgba(255,255,255,0.7);
      outline-offset: -2px;
    }

    .node small {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.9;
    }

    .legend {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      padding: 20px;
    }

    .overlay.show {
      display: flex;
    }

    .overlay-card {
      width: min(680px, 100%);
      background: white;
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.18);
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
    }

    .overlay-head {
      padding: 16px 18px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
    }

    .overlay-head h3 {
      margin: 0;
      font-size: 18px;
    }

    .overlay-head p {
      margin: 6px 0 0;
      font-size: 13px;
      line-height: 1.4;
      opacity: 0.92;
    }

    .close-btn {
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.18);
      color: white;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }

    .overlay-body {
      padding: 18px;
    }

    .overlay-quote {
      font-size: 20px;
      line-height: 1.45;
      margin: 0 0 14px;
      color: #111;
    }

    .overlay-meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
    }

    @media (max-width: 950px) {
      .value-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      model-viewer {
        height: 56vh;
        min-height: 340px;
      }

      .node {
        max-width: 170px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    src="./model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    scale="0.01 0.01 0.01"
    alt="Value Lab 3D model">
  </model-viewer>

  <div class="wrap">
    <div class="top">
      <div class="panel header">
        <h1>Value Lab</h1>
        <p>Each value is presented as a field of experiential nodes. Tap a node to open it, then add your own node by choosing the value it belongs to.</p>
      </div>

      <div class="panel controls">
        <button class="ar-btn" id="arButton" type="button">View in AR</button>
        <button class="ghost-btn" id="clearNodesButton" type="button">Clear Added Nodes</button>
      </div>

      <div class="panel form-card">
        <form id="nodeForm" class="form-grid">
          <input
            type="text"
            id="nodeInput"
            name="message"
            placeholder="Add a new experiential node..."
            required
          />
          <select id="valueSelect" name="value" required>
            <option value="care">Care</option>
            <option value="belonging">Belonging</option>
            <option value="neglect">Neglect</option>
            <option value="greed">Greed</option>
            <option value="trust">Trust</option>
            <option value="efficiency">Efficiency</option>
          </select>
          <button class="action-btn" type="submit" id="addNodeButton">Add Node</button>
          <button class="action-btn" type="button" id="sendFormspreeButton">Send</button>
        </form>
        <div class="status" id="statusMessage"></div>
      </div>
    </div>

    <div class="panel section">
      <h2>Experiential Value Fields</h2>
      <div class="value-grid" id="valueGrid"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-card">
      <div class="overlay-head" id="overlayHead">
        <div>
          <h3 id="overlayTitle">Node</h3>
          <p id="overlaySubtitle"></p>
        </div>
        <button class="close-btn" id="closeOverlay" type="button">Close</button>
      </div>
      <div class="overlay-body">
        <p class="overlay-quote" id="overlayText"></p>
        <div class="overlay-meta" id="overlayMeta"></div>
      </div>
    </div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const arButton = document.getElementById('arButton');
    const nodeForm = document.getElementById('nodeForm');
    const nodeInput = document.getElementById('nodeInput');
    const valueSelect = document.getElementById('valueSelect');
    const sendFormspreeButton = document.getElementById('sendFormspreeButton');
    const clearNodesButton = document.getElementById('clearNodesButton');
    const statusMessage = document.getElementById('statusMessage');
    const valueGrid = document.getElementById('valueGrid');

    const overlay = document.getElementById('overlay');
    const overlayHead = document.getElementById('overlayHead');
    const overlayTitle = document.getElementById('overlayTitle');
    const overlaySubtitle = document.getElementById('overlaySubtitle');
    const overlayText = document.getElementById('overlayText');
    const overlayMeta = document.getElementById('overlayMeta');
    const closeOverlay = document.getElementById('closeOverlay');

    const STORAGE_KEY = 'value-lab-experiential-nodes-v1';

    const valueMaps = [
      {
        id: 'care',
        title: 'Care',
        color: 'var(--care)',
        description: 'Support, protection, maintenance, and social holding.',
        quotes: [
          'There should be more affordable food places here.',
          'Fireworks should not be going off in the woodland.',
          'We need more places for young people to go.'
        ],
        positions: [
          { top: 18, left: 10 },
          { top: 52, left: 50 },
          { top: 70, left: 18 }
        ]
      },
      {
        id: 'belonging',
        title: 'Belonging',
        color: 'var(--belonging)',
        description: 'Attachment, familiarity, shared use, and collective place.',
        quotes: [
          'The bowling alley gave people a good place to go.',
          'The trees and the area has been taken over.',
          'Young people need their own spaces.'
        ],
        positions: [
          { top: 14, left: 18 },
          { top: 54, left: 56 },
          { top: 72, left: 22 }
        ]
      },
      {
        id: 'neglect',
        title: 'Neglect',
        color: 'var(--neglect)',
        description: 'Loss, disrepair, absence, and disregard.',
        quotes: [
          'The cinema used to bring us all together.',
          'They told us the buildings would not go that high.',
          'The swimming pool should be opened properly.'
        ],
        positions: [
          { top: 18, left: 52 },
          { top: 46, left: 14 },
          { top: 72, left: 48 }
        ]
      },
      {
        id: 'greed',
        title: 'Greed',
        color: 'var(--greed)',
        description: 'Extraction, excess, overdevelopment, and exclusion.',
        quotes: [
          'The high-rises has got too much now.',
          'It is turning into a concrete jungle.',
          'Some businesses here are too expensive for local people.'
        ],
        positions: [
          { top: 20, left: 18 },
          { top: 50, left: 52 },
          { top: 74, left: 20 }
        ]
      },
      {
        id: 'trust',
        title: 'Trust',
        color: 'var(--trust)',
        description: 'Reliability, promise, legitimacy, and doubt.',
        quotes: [
          'Fireworks should not be going off in the woodland.',
          'They told us the buildings would not go that high.',
          'What are you doing here and why?'
        ],
        positions: [
          { top: 16, left: 48 },
          { top: 50, left: 12 },
          { top: 72, left: 50 }
        ]
      },
      {
        id: 'efficiency',
        title: 'Efficiency',
        color: 'var(--efficiency)',
        description: 'Use, access, performance, convenience, and systems.',
        quotes: [
          'There needs to be more indoor places to use in winter.',
          'There should be more affordable food places here.',
          'The swimming pool should be fixed properly.'
        ],
        positions: [
          { top: 18, left: 14 },
          { top: 46, left: 54 },
          { top: 72, left: 24 }
        ]
      }
    ];

    function showStatus(text) {
      statusMessage.style.display = 'block';
      statusMessage.textContent = text;
      setTimeout(() => {
        statusMessage.style.display = 'none';
      }, 3000);
    }

    function getUserNodes() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveUserNodes(nodes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nodes));
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleString();
    }

    function truncate(text, max = 55) {
      return text.length > max ? text.slice(0, max - 1) + '…' : text;
    }

    function openNode(valueTitle, valueColor, valueDescription, text, meta) {
      overlayHead.style.background = valueColor;
      overlayTitle.textContent = valueTitle;
      overlaySubtitle.textContent = valueDescription;
      overlayText.textContent = text;
      overlayMeta.textContent = meta;
      overlay.classList.add('show');
    }

    closeOverlay.addEventListener('click', () => {
      overlay.classList.remove('show');
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('show');
      }
    });

    function renderValueMaps() {
      const userNodes = getUserNodes();

      valueGrid.innerHTML = valueMaps.map(value => {
        const builtInNodes = value.quotes.map((quote, index) => ({
          type: 'quote',
          text: quote,
          top: value.positions[index].top,
          left: value.positions[index].left
        }));

        const userNodesForValue = userNodes
          .filter(node => node.value === value.id)
          .map((node, index) => {
            const row = Math.floor(index / 2);
            const col = index % 2;
            return {
              ...node,
              type: 'user',
              top: 18 + row * 22,
              left: col === 0 ? 8 : 54
            };
          });

        const allNodes = [...builtInNodes, ...userNodesForValue];

        return `
          <div class="value-card">
            <div class="value-head" style="background:${value.color}">
              <h3>${value.title}</h3>
              <p>${value.description}</p>
            </div>
            <div class="value-body">
              <div class="node-field">
                ${allNodes.map((node, index) => `
                  <button
                    class="node ${node.type === 'user' ? 'user' : ''}"
                    style="top:${node.top}%; left:${node.left}%; background:${value.color};"
                    data-value-title="${value.title}"
                    data-value-color="${value.color}"
                    data-value-description="${value.description}"
                    data-text="${node.text.replace(/"/g, '&quot;')}"
                    data-meta="${node.type === 'user' ? `User added node • ${formatDate(node.createdAt)}` : 'Selected quote from value map'}"
                    type="button"
                  >
                    ${truncate(node.text)}
                    <small>${node.type === 'user' ? 'Added node' : 'Chosen quote'}</small>
                  </button>
                `).join('')}
              </div>

              <div class="legend">
                <span><i class="dot" style="background:${value.color}"></i>Chosen quotes</span>
                <span><i class="dot" style="background:${value.color}; outline:2px solid rgba(0,0,0,0.15)"></i>User nodes</span>
              </div>
            </div>
          </div>
        `;
      }).join('');

      valueGrid.querySelectorAll('.node').forEach(button => {
        button.addEventListener('click', () => {
          openNode(
            button.dataset.valueTitle,
            button.dataset.valueColor,
            button.dataset.valueDescription,
            button.dataset.text,
            button.dataset.meta
          );
        });
      });
    }

    arButton.addEventListener('click', async () => {
      try {
        if (viewer.activateAR) {
          await viewer.activateAR();
        }
      } catch (error) {
        showStatus('AR could not open on this device.');
      }
    });

    nodeForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const text = nodeInput.value.trim();
      const value = valueSelect.value;

      if (!text) return;

      const nodes = getUserNodes();
      nodes.push({
        text,
        value,
        createdAt: new Date().toISOString()
      });

      saveUserNodes(nodes);
      nodeInput.value = '';
      renderValueMaps();
      showStatus('Experiential node added.');
    });

    sendFormspreeButton.addEventListener('click', async () => {
      const text = nodeInput.value.trim();
      const value = valueSelect.value;

      if (!text) {
        showStatus('Write a node first.');
        return;
      }

      sendFormspreeButton.disabled = true;
      sendFormspreeButton.textContent = 'Sending...';

      const formData = new FormData();
      formData.append('message', `[${value.toUpperCase()}] ${text}`);

      try {
        const response = await fetch('https://formspree.io/f/xwvwbgrg', {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          showStatus('Message sent.');
        } else {
          showStatus('Could not send message.');
        }
      } catch (error) {
        showStatus('Connection problem.');
      }

      sendFormspreeButton.disabled = false;
      sendFormspreeButton.textContent = 'Send';
    });

    clearNodesButton.addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      renderValueMaps();
      showStatus('Added nodes cleared.');
    });

    renderValueMaps();
  </script>
</body>
</html>
