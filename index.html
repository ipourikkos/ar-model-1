<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Model</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #ffffff;
    }

    .note {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 10;
      text-align: center;
    }

    .feedback {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(255, 255, 255, 0.96);
      padding: 12px;
      border-radius: 12px;
      z-index: 20;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .feedback input,
    .feedback textarea,
    .feedback button {
      font: inherit;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      width: 100%;
    }

    .feedback textarea {
      min-height: 90px;
      resize: vertical;
    }

    .feedback button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .feedback button:hover {
      opacity: 0.9;
    }

    @media (max-width: 700px) {
      .feedback {
        top: auto;
        right: 12px;
        left: 12px;
        bottom: 70px;
        width: auto;
      }

      .note {
        bottom: 12px;
        left: 12px;
        right: 12px;
        transform: none;
      }
    }
  </style>
</head>
<body>

  <model-viewer
    src="model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    scale="0.01 0.01 0.01">
  </model-viewer>

  <form action="https://formspree.io/f/xwvwbgrg" method="POST" class="feedback">
    <input type="text" name="name" placeholder="Your name (optional)">
    <textarea name="message" placeholder="Leave a note..." required></textarea>
    <button type="submit">Send</button>
  </form>

  <div class="note">
    Open on phone, tap AR, then move phone to detect a surface.
  </div>

</body>
</html>
