<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VALUE LAB - SE16</title>

<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

<style>
  body { margin:0; font-family: Arial, sans-serif; background:#f5f5f2; }
  .container { display:grid; grid-template-columns:1.2fr 0.8fr; gap:20px; padding:20px; }
  model-viewer { width:100%; height:80vh; background:#fff; }
  .ar-btn { position:absolute; bottom:20px; left:20px; background:#000; color:#fff; border:none; padding:18px 26px; font-size:16px; font-weight:bold; border-radius:20px; cursor:pointer; }
  .form { background:#fff; padding:20px; border-radius:20px; }
  h1 { margin-bottom:20px; }
  .values { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
  .value { padding:14px; border-radius:14px; cursor:pointer; text-align:center; font-weight:bold; border:1px solid #ccc; }
  .active { outline:2px solid #000; }
  textarea { width:100%; height:150px; padding:12px; border-radius:12px; border:1px solid #ccc; margin-bottom:10px; }
  button { padding:14px; border:none; background:#000; color:#fff; border-radius:14px; cursor:pointer; width:100%; }
  .care { background:#d7b6c2; }
  .neglect { background:#d8c4e4; }
  .trust { background:#d4e8eb; }
  .efficiency { background:#d6e6cf; }
  .greed { background:#e7debf; }
  .belonging { background:#e5d1cb; }
  @media(max-width:900px){ .container { grid-template-columns:1fr; } }
</style>
</head>

<body>

<div class="container">

  <div style="position:relative;">
    <model-viewer
      id="model"
      src="model.glb"
      ios-src="model.usdz"
      ar
      ar-modes="scene-viewer quick-look webxr"
      scale="0.05 0.05 0.05"
      camera-controls
      auto-rotate>
    </model-viewer>

    <button class="ar-btn" onclick="document.getElementById('model').activateAR()">
      ENTER AR
    </button>
  </div>

  <div class="form">
    <h1>VALUE LAB - SE16</h1>

    <form action="https://formspree.io/f/xeepzwbz" method="POST">

      <div class="values">
        <div class="value care" data="Care">CARE</div>
        <div class="value neglect" data="Neglect">NEGLECT</div>
        <div class="value trust" data="Trust">TRUST</div>
        <div class="value efficiency" data="Efficiency">EFFICIENCY</div>
        <div class="value greed" data="Greed">GREED</div>
        <div class="value belonging" data="Belonging">BELONGING</div>
      </div>

      <input type="hidden" name="Value" id="value" required>

      <textarea name="Text" required></textarea>

      <button type="submit">SEND</button>

    </form>
  </div>

</div>

<script>
  const values = document.querySelectorAll('.value');
  const input = document.getElementById('value');

  values.forEach(v => {
    v.onclick = () => {
      values.forEach(x => x.classList.remove('active'));
      v.classList.add('active');
      input.value = v.getAttribute('data');
    }
  });
</script>

</body>
</html>
