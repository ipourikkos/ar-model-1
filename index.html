<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Value Space</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #f4f4f4;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

canvas {
  display: block;
}

.ui {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  background: rgba(255,255,255,0.92);
  padding: 10px;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  z-index: 10;
}

input {
  border: 1px solid #ccc;
  padding: 10px 12px;
  width: 260px;
  border-radius: 8px;
}

button {
  border: none;
  background: black;
  color: white;
  padding: 10px 14px;
  cursor: pointer;
  border-radius: 8px;
  font-weight: 700;
}

.info {
  position: fixed;
  top: 16px;
  left: 16px;
  background: rgba(255,255,255,0.9);
  padding: 12px 14px;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  z-index: 10;
  max-width: 320px;
}

.info h1 {
  margin: 0 0 6px;
  font-size: 20px;
}

.info p {
  margin: 0;
  font-size: 13px;
  color: #555;
  line-height: 1.4;
}

.status {
  position: fixed;
  bottom: 78px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: #555;
  background: rgba(255,255,255,0.85);
  padding: 8px 12px;
  border-radius: 999px;
  z-index: 10;
  min-width: 120px;
  text-align: center;
}
</style>
</head>

<body>

<div class="info">
  <h1>Value Space</h1>
  <p>Click a value plane, then add a thought. Built-in quotes are already placed in each field.</p>
</div>

<div class="ui">
  <input id="input" placeholder="Add thought..." />
  <button id="send">Send</button>
</div>

<div class="status" id="status">No value selected</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf4f4f4);

// CAMERA
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.8, 6);

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// CONTROLS
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0.7, 0);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 0.75));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7);
scene.add(light);

// DATA
const values = [
  {
    name: "Care",
    quotes: [
      "The bowling alley gave people somewhere to go.",
      "There should be more affordable food places here.",
      "Fireworks should not be going off in the woodland.",
      "There should be more places for kids to feel safer.",
      "We need more places for young people to go."
    ]
  },
  {
    name: "Neglect",
    quotes: [
      "The cinema used to be there.",
      "The swimming pool should be opened properly.",
      "They told us the buildings would not go that high.",
      "I was asked to pay £1500 to get a driving licence.",
      "It is turning into a concrete jungle.",
      "The high-rises are too much now."
    ]
  },
  {
    name: "Greed",
    quotes: [
      "The high-rises has got too much now.",
      "It is turning into a concrete jungle.",
      "They are taking away our hidden gem.",
      "The sustainability is an excuse to build more.",
      "Some businesses here are too expensive for local people."
    ]
  },
  {
    name: "Belonging",
    quotes: [
      "The trees in the area has been taken over.",
      "Some businesses here are too expensive for local people.",
      "If it feels good now because it is quiet, but I do not know what it will become.",
      "Young people need their own spaces.",
      "The bowling alley gave people a good place to go."
    ]
  },
  {
    name: "Trust",
    quotes: [
      "What are you doing here and why?",
      "If it feels good now because it is quiet, but I do not know what it will become.",
      "They told us the buildings would not go that high.",
      "Fireworks should not be going off in the woodland.",
      "I was asked to pay £4000 to become a councillor.",
      "They use sustainability as an excuse to build more."
    ]
  },
  {
    name: "Efficiency",
    quotes: [
      "The market was so small and rubbish.",
      "The swimming pool should be fixed properly.",
      "There should be more affordable food places here.",
      "There needs to be more indoor places to use in winter.",
      "It was impossible after their car went to McDonald’s and came back while nothing had moved.",
      "Schools."
    ]
  }
];

const group = new THREE.Group();
scene.add(group);

const planes = [];
let selectedPlane = null;
const status = document.getElementById("status");

// HELPERS
function makeTextTexture(text, options = {}) {
  const {
    width = 768,
    height = 256,
    bg = null,
    color = "white",
    font = "bold 30px Arial"
  } = options;

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  if (bg) {
    ctx.fillStyle = bg;
    roundRect(ctx, 0, 0, width, height, 30);
    ctx.fill();
  }

  ctx.fillStyle = color;
  ctx.font = font;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const lines = wrapText(ctx, text, width * 0.82);
  const lineHeight = 36;
  const totalHeight = lines.length * lineHeight;
  let y = (height - totalHeight) / 2 + lineHeight / 2;

  lines.forEach(line => {
    ctx.fillText(line, width / 2, y);
    y += lineHeight;
  });

  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let line = '';

  for (let n = 0; n < words.length; n++) {
    const testLine = line + words[n] + ' ';
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && n > 0) {
      lines.push(line.trim());
      line = words[n] + ' ';
    } else {
      line = testLine;
    }
  }
  lines.push(line.trim());
  return lines;
}

function roundRect(ctx, x, y, width, height, radius) {
  ctx.beginPath();
  ctx.moveTo(x + radius, y);
  ctx.lineTo(x + width - radius, y);
  ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
  ctx.lineTo(x + width, y + height - radius);
  ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
  ctx.lineTo(x + radius, y + height);
  ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
  ctx.lineTo(x, y + radius);
  ctx.quadraticCurveTo(x, y, x + radius, y);
  ctx.closePath();
}

// VALUE PLANES
values.forEach((value, i) => {
  const geo = new THREE.PlaneGeometry(2.1, 3.2);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xcccccc,
    transparent: true,
    opacity: 0.48,
    side: THREE.DoubleSide
  });

  const plane = new THREE.Mesh(geo, mat);

  const angle = (i / values.length) * Math.PI * 2;
  plane.position.set(Math.cos(angle) * 2.6, 0.2, Math.sin(angle) * 2.6);
  plane.rotation.y = -angle + Math.PI / 2;
  plane.userData.value = value.name;

  group.add(plane);
  planes.push(plane);

  // Title
  const titleTexture = makeTextTexture(value.name, {
    width: 512,
    height: 180,
    color: "black",
    font: "bold 58px Arial"
  });

  const titlePlane = new THREE.Mesh(
    new THREE.PlaneGeometry(1.5, 0.55),
    new THREE.MeshBasicMaterial({ map: titleTexture, transparent: true })
  );
  titlePlane.position.copy(plane.position);
  titlePlane.position.y += 1.55;
  titlePlane.rotation.y = plane.rotation.y;
  group.add(titlePlane);

  // Quotes around each value
  value.quotes.forEach((quote, qIndex) => {
    const texture = makeTextTexture(quote, {
      width: 700,
      height: 220,
      bg: "#6e8788",
      color: "white",
      font: "bold 28px Arial"
    });

    const quoteMesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1.4, 0.46),
      new THREE.MeshBasicMaterial({ map: texture, transparent: true })
    );

    const localX = (qIndex % 2 === 0 ? -0.55 : 0.55);
    const localY = 0.95 - qIndex * 0.52;
    const localZ = 0.12 + (qIndex * 0.02);

    quoteMesh.position.copy(plane.position);
    quoteMesh.position.x += Math.cos(angle + Math.PI / 2) * localX;
    quoteMesh.position.z += Math.sin(angle + Math.PI / 2) * localX;
    quoteMesh.position.y += localY;
    quoteMesh.rotation.y = plane.rotation.y;
    quoteMesh.position.x += Math.cos(angle) * localZ;
    quoteMesh.position.z += Math.sin(angle) * localZ;

    group.add(quoteMesh);
  });
});

// RAYCAST
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(planes);

  if (intersects.length > 0) {
    selectedPlane = intersects[0].object;
    planes.forEach(p => p.material.opacity = 0.28);
    selectedPlane.material.opacity = 0.88;
    status.textContent = `Selected: ${selectedPlane.userData.value}`;
  }
});

// ADD USER NODE
document.getElementById("send").onclick = async () => {
  const text = document.getElementById("input").value.trim();
  if (!text || !selectedPlane) {
    status.textContent = !selectedPlane ? "Select a value plane first" : "Write something first";
    return;
  }

  const texture = makeTextTexture(text, {
    width: 700,
    height: 220,
    bg: "#00bfcf",
    color: "white",
    font: "bold 28px Arial"
  });

  const node = new THREE.Mesh(
    new THREE.PlaneGeometry(1.35, 0.46),
    new THREE.MeshBasicMaterial({ map: texture, transparent: true })
  );

  node.position.copy(selectedPlane.position);
  node.rotation.y = selectedPlane.rotation.y;

  const offsetRight = (Math.random() - 0.5) * 1.2;
  const offsetUp = (Math.random() * 1.7) - 0.2;
  const offsetForward = 0.25 + Math.random() * 0.2;

  const angle = Math.atan2(selectedPlane.position.z, selectedPlane.position.x);

  node.position.x += Math.cos(angle + Math.PI / 2) * offsetRight;
  node.position.z += Math.sin(angle + Math.PI / 2) * offsetRight;
  node.position.y += offsetUp;
  node.position.x += Math.cos(angle) * offsetForward;
  node.position.z += Math.sin(angle) * offsetForward;

  group.add(node);

  try {
    const formData = new FormData();
    formData.append("message", `[${selectedPlane.userData.value}] ${text}`);

    await fetch("https://formspree.io/f/xwvwbgrg", {
      method: "POST",
      body: formData,
      headers: { "Accept": "application/json" }
    });

    status.textContent = `Added to ${selectedPlane.userData.value}`;
  } catch {
    status.textContent = `Added locally to ${selectedPlane.userData.value}`;
  }

  document.getElementById("input").value = "";
};

// ANIMATE
function animate() {
  requestAnimationFrame(animate);
  group.rotation.y += 0.0018;
  controls.update();
  renderer.render(scene, camera);
}
animate();

// RESIZE
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
