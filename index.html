<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Value Lab</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root {
      --bg: #f3f3f3;
      --panel: rgba(255,255,255,0.94);
      --line: rgba(0,0,0,0.08);
      --text: #111;
      --muted: #666;
      --shadow: 0 10px 30px rgba(0,0,0,0.10);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      min-height: 420px;
      background: #fff;
      --ar-button-display: none;
    }

    .wrap {
      width: min(1180px, calc(100% - 24px));
      margin: 0 auto;
      padding: 12px 0 32px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .top {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .header {
      padding: 16px 18px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }

    .ar-btn, .send-btn, .chip {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .ar-btn, .send-btn {
      background: #111;
      color: #fff;
      font-weight: 700;
    }

    .chip {
      background: rgba(0,0,0,0.06);
      color: #111;
      border: 1px solid var(--line);
    }

    .chip.active {
      background: #111;
      color: #fff;
    }

    .form-card {
      padding: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .form-grid input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    .status {
      display: none;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .section {
      margin-top: 16px;
      padding: 14px;
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.86);
      padding: 12px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .card p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: #222;
      white-space: pre-wrap;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.86);
    }

    .item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .item p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: #222;
      white-space: pre-wrap;
    }

    .meta {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      model-viewer {
        height: 58vh;
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    src="./model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    scale="0.01 0.01 0.01"
    alt="Value Lab 3D model">
  </model-viewer>

  <div class="wrap">
    <div class="top">
      <div class="panel header">
        <h1>Value Lab</h1>
        <p>AR model, value maps, and all recorded engagements that produced them.</p>
      </div>

      <div class="panel controls">
        <button class="ar-btn" id="arButton" type="button">View in AR</button>
        <button class="chip active" type="button" data-filter="all">All</button>
        <button class="chip" type="button" data-filter="care">Care</button>
        <button class="chip" type="button" data-filter="belonging">Belonging</button>
        <button class="chip" type="button" data-filter="neglect">Neglect</button>
        <button class="chip" type="button" data-filter="greed">Greed</button>
        <button class="chip" type="button" data-filter="trust">Trust</button>
        <button class="chip" type="button" data-filter="efficiency">Efficiency</button>
        <button class="chip" type="button" data-filter="engagement">Engagement</button>
        <button class="chip" type="button" data-filter="memory">Memory</button>
      </div>

      <div class="panel form-card">
        <form id="feedbackForm" class="form-grid">
          <input
            type="text"
            id="messageInput"
            name="message"
            placeholder="Leave a note..."
            required
          />
          <button class="send-btn" type="submit" id="sendButton">Send</button>
        </form>
        <div class="status" id="statusMessage"></div>
      </div>
    </div>

    <div class="panel section">
      <h2>Value Maps</h2>
      <div class="cards" id="valueMapCards"></div>
    </div>

    <div class="panel section">
      <h2>All Engagements</h2>
      <div class="list" id="engagementList"></div>
    </div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const arButton = document.getElementById('arButton');
    const valueMapCards = document.getElementById('valueMapCards');
    const engagementList = document.getElementById('engagementList');
    const chips = [...document.querySelectorAll('.chip')];
    const feedbackForm = document.getElementById('feedbackForm');
    const sendButton = document.getElementById('sendButton');
    const statusMessage = document.getElementById('statusMessage');

    arButton.addEventListener('click', async () => {
      try {
        if (viewer.activateAR) {
          await viewer.activateAR();
        }
      } catch (error) {
        showStatus('AR could not open on this device.');
      }
    });

    function showStatus(text) {
      statusMessage.style.display = 'block';
      statusMessage.textContent = text;
      setTimeout(() => {
        statusMessage.style.display = 'none';
      }, 3000);
    }

    feedbackForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      sendButton.disabled = true;
      sendButton.textContent = 'Sending...';

      try {
        const response = await fetch('https://formspree.io/f/xwvwbgrg', {
          method: 'POST',
          body: new FormData(feedbackForm),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          feedbackForm.reset();
          showStatus('Message sent.');
        } else {
          showStatus('Could not send message.');
        }
      } catch (error) {
        showStatus('Connection problem.');
      }

      sendButton.disabled = false;
      sendButton.textContent = 'Send';
    });

        text: 'Noted that redevelopment does not significantly affect her because it is far from where she lives, and she has lived in the area for 10 years.',
        meta: 'Insight: proximity shapes perception and redevelopment is experienced unevenly across space.'
      },
      {
        value: 'engagement',
        title: 'Workshop 3, Participant 05',
        text: 'Declined participation, stating they were not interested in engaging.',
        meta: 'Insight: non-participation can itself be a response.'
      },
      {
        value: 'engagement',
        title: 'Workshop 3, Participant 06',
        text: 'Said things feel great for now, valuing the area’s quietness but uncertain about future changes.',
        meta: 'Insight: ambivalence is a meaningful position.'
      },
      {
        value: 'neglect',
        title: 'Workshop 3, Participant 07',
        text: 'Expressed strong concern that redevelopment is taking away our hidden gem, opposing further construction, especially glass buildings and new infrastructure. They criticised sustainability language as justification for expansion, mentioned a new Tesco near their home as unwanted change, and emphasised protecting nature and avoiding overcrowding.',
        meta: 'Insight: tension between official improvement narratives and local perceptions of environmental and cultural erosion.'
      },
      {
        value: 'trust',
        title: 'Workshop 3, Participant 08',
        text: 'Responded with visible anger, saying he had been asked to pay £4,000 to become councillor and £1,500 to obtain a driving licence, reading these experiences as corruption. He shared the project with a friend who agreed with his frustrations.',
        meta: 'Insight: deep mistrust of institutional processes and systemic injustice.'
      },
      {
        value: 'efficiency',
        title: 'Workshop 3, Participant 09',
        text: 'Criticised Corner Corner’s lighting and food, requested restoration of lost amenities, and specifically mentioned fixing the pool.',
        meta: 'Insight: new spaces are judged through everyday usability.'
      },
      {
        value: 'efficiency',
        title: 'Workshop 3, Participant 10',
        text: 'Described severe traffic congestion, recounting an incident where a driver left their car, went to McDonald’s, and returned while traffic had not moved, raising concerns about emergency vehicle access.',
        meta: 'Insight: personal anecdotes act as evidence of infrastructural stress.'
      },
      {
        value: 'efficiency',
        title: 'Workshop 3, Dockland Settlement staff member',
        text: 'Explained how activities are funded. When external funding is available, activities are free. When funding is insufficient, a small participation fee is introduced. Funding typically lasts around one year. When asked whether a small fixed fee such as five pounds would reduce participation, she said it likely would not discourage attendance.',
        meta: 'Insight: community activity is structured around short-term funding cycles and accessibility.'
      }
    ];

    let activeFilter = 'all';

    function renderValueMaps() {
      const filtered = activeFilter === 'all' || activeFilter === 'engagement' || activeFilter === 'memory'
        ? valueMaps
        : valueMaps.filter(item => item.id === activeFilter);

      valueMapCards.innerHTML = filtered.map(item => `
        <div class="card">
          <h3>${item.title}</h3>
          <p>${item.quotes.join('\\n\\n')}</p>
        </div>
      `).join('');
    }

    function renderEngagements() {
      const filtered = activeFilter === 'all'
        ? engagements
        : engagements.filter(item => item.value === activeFilter);

      engagementList.innerHTML = filtered.map(item => `
        <div class="item">
          <strong>${item.title}</strong>
          <p>${item.text}</p>
          <div class="meta">${item.meta}</div>
        </div>
      `).join('');
    }

    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        renderValueMaps();
        renderEngagements();
      });
    });

    renderValueMaps();
    renderEngagements();
  </script>
</body>
