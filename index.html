<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Value Lab</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root{
      --bg:#efece7;
      --panel:rgba(255,255,255,0.82);
      --line:rgba(0,0,0,0.08);
      --text:#111;
      --muted:#666;
      --shadow:0 18px 40px rgba(0,0,0,0.10);
      --radius:22px;

      --care:#4f7c68;
      --neglect:#9b7a32;
      --greed:#6e3a3a;
      --belonging:#5f7d6d;
      --trust:#7b6332;
      --efficiency:#8a7a3a;

      --cyan:#5f8788;
    }

    * { box-sizing:border-box; }

    html, body {
      margin:0;
      min-height:100%;
      font-family:Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 30%),
        linear-gradient(180deg, #f4f1ec 0%, #ebe6df 100%);
    }

    model-viewer{
      width:100%;
      height:64vh;
      min-height:380px;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.86) 0%, rgba(245,242,238,1) 70%);
      --ar-button-display:none;
    }

    .wrap{
      width:min(1280px, calc(100% - 28px));
      margin:0 auto;
      padding:14px 0 36px;
    }

    .glass{
      background:var(--panel);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,0.55);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .header{
      margin-top:14px;
      padding:18px 20px;
    }

    .header h1{
      margin:0;
      font-size:clamp(28px,4vw,46px);
      line-height:0.95;
      letter-spacing:-0.05em;
    }

    .header p{
      margin:8px 0 0;
      font-size:14px;
      color:var(--muted);
      max-width:620px;
      line-height:1.45;
    }

    .toolbar{
      margin-top:14px;
      padding:12px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
    }

    button, input, select, textarea{
      font:inherit;
    }

    .btn, .ghost{
      appearance:none;
      border:none;
      border-radius:999px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      transition:transform .15s ease;
    }

    .btn:hover, .ghost:hover{
      transform:translateY(-1px);
    }

    .btn{
      background:#111;
      color:#fff;
      font-weight:700;
      box-shadow:0 10px 24px rgba(0,0,0,0.16);
    }

    .ghost{
      background:rgba(255,255,255,0.7);
      border:1px solid rgba(0,0,0,0.08);
      color:#111;
    }

    .main{
      margin-top:16px;
      display:grid;
      grid-template-columns: 1.05fr 1.25fr;
      gap:16px;
      align-items:start;
    }

    .panel{
      padding:16px;
    }

    .panel h2{
      margin:0 0 14px;
      font-size:15px;
      text-transform:uppercase;
      letter-spacing:.03em;
      color:var(--muted);
    }

    .instructions{
      display:grid;
      gap:10px;
    }

    .step{
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,255,255,0.7);
      border:1px solid var(--line);
      font-size:14px;
      line-height:1.4;
    }

    .form{
      display:grid;
      gap:10px;
      margin-top:14px;
    }

    .form select,
    .form textarea{
      width:100%;
      border:1px solid rgba(0,0,0,0.08);
      border-radius:18px;
      padding:14px 16px;
      background:rgba(255,255,255,0.92);
      outline:none;
      font-size:14px;
    }

    .form textarea{
      min-height:120px;
      resize:vertical;
    }

    .status{
      display:none;
      font-size:13px;
      color:var(--muted);
      margin-top:4px;
    }

    .values-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:14px;
    }

    .value-card{
      border-radius:24px;
      overflow:hidden;
      background:rgba(255,255,255,0.64);
      border:1px solid rgba(255,255,255,0.55);
      box-shadow:0 16px 34px rgba(0,0,0,0.07);
    }

    .value-head{
      padding:14px 16px;
      color:#fff;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .value-head h3{
      margin:0;
      font-size:24px;
      line-height:0.95;
      letter-spacing:-0.04em;
    }

    .count{
      min-width:36px;
      height:36px;
      display:grid;
      place-items:center;
      border-radius:999px;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.22);
      font-size:12px;
      font-weight:700;
    }

    .value-body{
      padding:14px;
      display:grid;
      gap:10px;
      min-height:170px;
    }

    .seed{
      font-size:12px;
      color:var(--muted);
      padding:10px 12px;
      border:1px dashed rgba(0,0,0,0.10);
      border-radius:14px;
      background:rgba(255,255,255,0.55);
      line-height:1.35;
    }

    .entry{
      font-size:13px;
      line-height:1.4;
      color:#fff;
      background:var(--cyan);
      border-radius:16px;
      padding:10px 12px;
      box-shadow:0 10px 18px rgba(0,0,0,0.10);
    }

    .entry small{
      display:block;
      margin-top:6px;
      font-size:11px;
      opacity:0.9;
    }

    .empty{
      color:var(--muted);
      font-size:13px;
      padding:10px 0;
    }

    .care .value-head{ background:linear-gradient(135deg, var(--care), #6b9983); }
    .neglect .value-head{ background:linear-gradient(135deg, var(--neglect), #b79042); }
    .greed .value-head{ background:linear-gradient(135deg, var(--greed), #875452); }
    .belonging .value-head{ background:linear-gradient(135deg, var(--belonging), #7b9887); }
    .trust .value-head{ background:linear-gradient(135deg, var(--trust), #9a7d48); }
    .efficiency .value-head{ background:linear-gradient(135deg, var(--efficiency), #ab9850); }

    @media (max-width: 980px){
      .main{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 760px){
      .values-grid{
        grid-template-columns:1fr;
      }

      model-viewer{
        height:56vh;
        min-height:340px;
      }
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    src="./model.glb?v=3"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    alt="Value map model">
  </model-viewer>

  <div class="wrap">
    <div class="glass header">
      <h1>Value Lab</h1>
      <p>Read the model, choose a value, then add your thought to that value.</p>
    </div>

    <div class="glass toolbar">
      <button class="btn" id="arButton" type="button">View in AR</button>
      <button class="ghost" id="clearButton" type="button">Clear Added Thoughts</button>
    </div>

    <div class="main">
      <div class="glass panel">
        <h2>Add a Thought</h2>

        <div class="instructions">
          <div class="step">1. Explore the value-map model.</div>
          <div class="step">2. Choose one value.</div>
          <div class="step">3. Add your thought.</div>
        </div>

        <form class="form" id="thoughtForm">
          <select id="valueSelect" required>
            <option value="" selected disabled>Choose a value</option>
            <option value="care">Care</option>
            <option value="neglect">Neglect</option>
            <option value="greed">Greed</option>
            <option value="belonging">Belonging</option>
            <option value="trust">Trust</option>
            <option value="efficiency">Efficiency</option>
          </select>

          <textarea
            id="thoughtInput"
            placeholder="Write your thought here..."
            required
          ></textarea>

          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn" type="submit" id="addButton">Add Thought</button>
            <button class="btn" type="button" id="sendButton">Send</button>
          </div>
        </form>

        <div class="status" id="statusMessage"></div>
      </div>

      <div class="glass panel">
        <h2>Values</h2>
        <div class="values-grid" id="valuesGrid"></div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "value-lab-thoughts-v1";

    const viewer = document.getElementById("viewer");
    const arButton = document.getElementById("arButton");
    const clearButton = document.getElementById("clearButton");
    const thoughtForm = document.getElementById("thoughtForm");
    const valueSelect = document.getElementById("valueSelect");
    const thoughtInput = document.getElementById("thoughtInput");
    const sendButton = document.getElementById("sendButton");
    const statusMessage = document.getElementById("statusMessage");
    const valuesGrid = document.getElementById("valuesGrid");

    const valueSeedText = {
      care: "Support, safety, holding, repair.",
      neglect: "Absence, loss, disrepair, disregard.",
      greed: "Extraction, excess, overbuilding, exclusion.",
      belonging: "Attachment, familiarity, shared place.",
      trust: "Reliability, promise, doubt, legitimacy.",
      efficiency: "Use, access, systems, performance."
    };

    const valueOrder = [
      { id: "care", title: "Care" },
      { id: "neglect", title: "Neglect" },
      { id: "greed", title: "Greed" },
      { id: "belonging", title: "Belonging" },
      { id: "trust", title: "Trust" },
      { id: "efficiency", title: "Efficiency" }
    ];

    function showStatus(text) {
      statusMessage.style.display = "block";
      statusMessage.textContent = text;
      setTimeout(() => {
        statusMessage.style.display = "none";
      }, 2600);
    }

    function getThoughts() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveThoughts(thoughts) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(thoughts));
    }

    function formatDate(dateString) {
      return new Date(dateString).toLocaleString();
    }

    function renderValues() {
      const thoughts = getThoughts();

      valuesGrid.innerHTML = valueOrder.map(value => {
        const items = thoughts.filter(t => t.value === value.id);

        return `
          <div class="value-card ${value.id}">
            <div class="value-head">
              <h3>${value.title}</h3>
              <div class="count">${items.length}</div>
            </div>
            <div class="value-body">
              <div class="seed">${valueSeedText[value.id]}</div>
              ${
                items.length
                  ? items.map(item => `
                      <div class="entry">
                        ${item.text}
                        <small>${formatDate(item.createdAt)}</small>
                      </div>
                    `).join("")
                  : `<div class="empty">No thoughts added yet.</div>`
              }
            </div>
          </div>
        `;
      }).join("");
    }

    arButton.addEventListener("click", async () => {
      try {
        if (viewer.activateAR) {
          await viewer.activateAR();
        }
      } catch {
        showStatus("AR could not open.");
      }
    });

    thoughtForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const value = valueSelect.value;
      const text = thoughtInput.value.trim();

      if (!value) {
        showStatus("Choose a value first.");
        return;
      }

      if (!text) {
        showStatus("Write a thought first.");
        return;
      }

      const thoughts = getThoughts();
      thoughts.push({
        value,
        text,
        createdAt: new Date().toISOString()
      });

      saveThoughts(thoughts);
      thoughtForm.reset();
      renderValues();
      showStatus("Thought added.");
    });

    sendButton.addEventListener("click", async () => {
      const value = valueSelect.value;
      const text = thoughtInput.value.trim();

      if (!value) {
        showStatus("Choose a value first.");
        return;
      }

      if (!text) {
        showStatus("Write a thought first.");
        return;
      }

      sendButton.disabled = true;
      sendButton.textContent = "Sending...";

      const formData = new FormData();
      formData.append("message", `[${value.toUpperCase()}] ${text}`);

      try {
        const response = await fetch("https://formspree.io/f/xwvwbgrg", {
          method: "POST",
          body: formData,
          headers: { "Accept": "application/json" }
        });

        if (response.ok) {
          showStatus("Sent.");
        } else {
          showStatus("Could not send.");
        }
      } catch {
        showStatus("Connection problem.");
      }

      sendButton.disabled = false;
      sendButton.textContent = "Send";
    });

    clearButton.addEventListener("click", () => {
      localStorage.removeItem(STORAGE_KEY);
      renderValues();
      showStatus("Added thoughts cleared.");
    });

    renderValues();
  </script>
</body>
</html>
