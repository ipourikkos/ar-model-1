<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Model</title>

  <!-- KEEP YOUR ORIGINAL SCRIPT (this is why it works for you) -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f3f3f3;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #ffffff;
    }

    .note {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 10;
      text-align: center;
    }

    /* VERY LIGHT form (won’t break AR) */
    .feedback {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(255,255,255,0.9);
      padding: 8px;
      border-radius: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .feedback input {
      border: 1px solid #ccc;
      padding: 6px;
      font-size: 12px;
    }

    .feedback button {
      border: none;
      background: black;
      color: white;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <model-viewer
    src="./model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    scale="0.01 0.01 0.01">
  </model-viewer>

  <!-- SIMPLE FORM (safe) -->
  <form action="https://formspree.io/f/xwvwbgrg" method="POST" class="feedback">
    <input type="text" name="message" placeholder="Leave a note..." required>
    <button type="submit">Send</button>
  </form>

  <div class="note">
    Open on phone, tap AR, then move phone to detect a surface.
  </div>

</body>
</html>
