<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Value Lab</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    html, body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#f2f2f2;
      color:#111;
    }

    model-viewer{
      width:100%;
      height:65vh;
      background:#fff;
    }

    .wrap{
      padding:16px;
      max-width:900px;
      margin:auto;
    }

    h1{
      margin:0;
      font-size:30px;
    }

    p{
      margin:6px 0 16px;
      color:#666;
      font-size:14px;
    }

    .controls{
      margin-bottom:14px;
    }

    .main-btn{
      border:none;
      padding:12px 16px;
      border-radius:999px;
      cursor:pointer;
      font-weight:bold;
      background:black;
      color:white;
      font-size:14px;
    }

    .value-picker{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:10px;
      margin-bottom:12px;
    }

    .value-btn{
      border:none;
      padding:14px;
      border-radius:14px;
      cursor:pointer;
      background:#ddd;
      color:#111;
      font-weight:bold;
      font-size:14px;
      text-transform:capitalize;
      opacity:0.7;
      transition:all .15s ease;
    }

    .value-btn.active{
      opacity:1;
      background:#bbb;
      transform:scale(1.03);
      box-shadow:0 8px 20px rgba(0,0,0,0.15);
    }

    .selected{
      font-size:13px;
      color:#666;
      margin-bottom:10px;
    }

    textarea{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #ddd;
      margin-bottom:10px;
      font-size:14px;
      min-height:100px;
      resize:vertical;
    }

    .status{
      font-size:13px;
      color:#666;
      margin-top:6px;
    }

    @media (max-width:600px){
      .value-picker{
        grid-template-columns:repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <model-viewer
    id="viewer"
    src="./model.glb?v=5"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral">
  </model-viewer>

  <div class="wrap">
    <h1>Value Lab</h1>
    <p>Read the model, choose a value, then add your thought to that value.</p>

    <div class="controls">
      <button class="main-btn" id="arBtn">View in AR</button>
    </div>

    <div class="value-picker" id="valuePicker">
      <button class="value-btn" data-value="care">Care</button>
      <button class="value-btn" data-value="neglect">Neglect</button>
      <button class="value-btn" data-value="greed">Greed</button>
      <button class="value-btn" data-value="belonging">Belonging</button>
      <button class="value-btn" data-value="trust">Trust</button>
      <button class="value-btn" data-value="efficiency">Efficiency</button>
    </div>

    <div class="selected" id="selectedLabel">No value selected</div>

    <textarea id="input" placeholder="Write your thought..."></textarea>

    <button class="main-btn" id="send">Send</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const viewer = document.getElementById("viewer");
    const arBtn = document.getElementById("arBtn");
    const send = document.getElementById("send");
    const input = document.getElementById("input");
    const status = document.getElementById("status");
    const valuePicker = document.getElementById("valuePicker");
    const selectedLabel = document.getElementById("selectedLabel");

    let selectedValue = "";

    valuePicker.addEventListener("click", (e)=>{
      const btn = e.target.closest(".value-btn");
      if(!btn) return;

      selectedValue = btn.dataset.value;

      document.querySelectorAll(".value-btn").forEach(b=>{
        b.classList.remove("active");
      });

      btn.classList.add("active");

      selectedLabel.textContent = "Selected value: " + selectedValue;
      status.textContent = "";
    });

    arBtn.onclick = async ()=>{
      if(viewer.activateAR) await viewer.activateAR();
    };

    send.onclick = async ()=>{
      const text = input.value.trim();

      if(!selectedValue){
        status.textContent = "Choose a value";
        return;
      }

      if(!text){
        status.textContent = "Write something";
        return;
      }

      try{
        const formData = new FormData();
        formData.append("message", `[${selectedValue}] ${text}`);

        await fetch("https://formspree.io/f/xwvwbgrg", {
          method:"POST",
          body:formData,
          headers:{"Accept":"application/json"}
        });

        status.textContent = "Sent";
      }catch{
        status.textContent = "Error sending";
      }

      input.value = "";
    };
  </script>

</body>
</html>
