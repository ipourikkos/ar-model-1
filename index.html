<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Value Lab</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root {
      --bg: #f3f3f3;
      --panel: rgba(255,255,255,0.94);
      --line: rgba(0,0,0,0.08);
      --text: #111;
      --muted: #666;
      --shadow: 0 10px 30px rgba(0,0,0,0.10);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: var(--bg);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    model-viewer {
      width: 100%;
      height: 70vh;
      min-height: 420px;
      background: #fff;
      --ar-button-display: none;
    }

    .wrap {
      width: min(1100px, calc(100% - 24px));
      margin: 0 auto;
      padding: 12px 0 32px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .top {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    .header {
      padding: 16px 18px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
    }

    .ar-btn, .send-btn, .chip {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    .ar-btn, .send-btn {
      background: #111;
      color: #fff;
      font-weight: 700;
    }

    .chip {
      background: rgba(0,0,0,0.06);
      color: #111;
      border: 1px solid var(--line);
    }

    .chip.active {
      background: #111;
      color: #fff;
    }

    .form-card {
      padding: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .form-grid input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      background: #fff;
    }

    .status {
      display: none;
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .section {
      margin-top: 16px;
      padding: 14px;
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255,255,255,0.86);
      padding: 12px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .card p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: #222;
      white-space: pre-wrap;
    }

    .small {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      background: rgba(255,255,255,0.86);
    }

    .item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .item p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
      color: #222;
      white-space: pre-wrap;
    }

    @media (max-width: 900px) {
      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      model-viewer {
        height: 58vh;
        min-height: 360px;
      }
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    src="./model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    scale="0.01 0.01 0.01"
    alt="Value Lab 3D model">
  </model-viewer>

  <div class="wrap">
    <div class="top">
      <div class="panel header">
        <h1>Value Lab</h1>
        <p>AR model, value maps, and the engagement material that produced them.</p>
      </div>

      <div class="panel controls">
        <button class="ar-btn" id="arButton" type="button">View in AR</button>
        <button class="chip active" type="button" data-filter="all">All</button>
        <button class="chip" type="button" data-filter="care">Care</button>
        <button class="chip" type="button" data-filter="belonging">Belonging</button>
        <button class="chip" type="button" data-filter="neglect">Neglect</button>
        <button class="chip" type="button" data-filter="greed">Greed</button>
        <button class="chip" type="button" data-filter="trust">Trust</button>
        <button class="chip" type="button" data-filter="efficiency">Efficiency</button>
      </div>

      <div class="panel form-card">
        <form id="feedbackForm" class="form-grid">
          <input
            type="text"
            id="messageInput"
            name="message"
            placeholder="Leave a note..."
            required
          />
          <button class="send-btn" type="submit" id="sendButton">Send</button>
        </form>
        <div class="status" id="statusMessage"></div>
      </div>
    </div>

    <div class="panel section">
      <h2>Value Maps</h2>
      <div class="cards" id="valueMapCards"></div>
    </div>

    <div class="panel section">
      <h2>Engagements and Nodes</h2>
      <div class="list" id="engagementList"></div>
    </div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const arButton = document.getElementById('arButton');
    const valueMapCards = document.getElementById('valueMapCards');
    const engagementList = document.getElementById('engagementList');
    const chips = [...document.querySelectorAll('.chip')];
    const feedbackForm = document.getElementById('feedbackForm');
    const sendButton = document.getElementById('sendButton');
    const statusMessage = document.getElementById('statusMessage');

    arButton.addEventListener('click', async () => {
      try {
        if (viewer.activateAR) {
          await viewer.activateAR();
        }
      } catch (error) {
        showStatus('AR could not open on this device.');
      }
    });

    function showStatus(text) {
      statusMessage.style.display = 'block';
      statusMessage.textContent = text;
      setTimeout(() => {
        statusMessage.style.display = 'none';
      }, 3000);
    }

    feedbackForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      sendButton.disabled = true;
      sendButton.textContent = 'Sending...';

      try {
        const response = await fetch('https://formspree.io/f/xwvwbgrg', {
          method: 'POST',
          body: new FormData(feedbackForm),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          feedbackForm.reset();
          showStatus('Message sent.');
        } else {
          showStatus('Could not send message.');
        }
      } catch (error) {
        showStatus('Connection problem.');
      }

      sendButton.disabled = false;
      sendButton.textContent = 'Send';
    });

    const valueMaps = [
      {
        id: 'care',
        title: 'Care',
        quotes: [
          'There should be more affordable food places here.',
          'Fireworks should not be going off in the woodland.',
          'We need more places for young people to go.'
        ]
      },
      {
        id: 'belonging',
        title: 'Belonging',
        quotes: [
          'The bowling alley gave people a good place to go.',
          'The trees and the area has been taken over.',
          'Young people need their own spaces.'
        ]
      },
      {
        id: 'neglect',
        title: 'Neglect',
        quotes: [
          'The cinema used to bring us all together.',
          'They told us the buildings would not go that high.',
          'The swimming pool should be opened properly.'
        ]
      },
      {
        id: 'greed',
        title: 'Greed',
        quotes: [
          'The high-rises has got too much now.',
          'It is turning into a concrete jungle.',
          'Some businesses here are too expensive for local people.'
        ]
      },
      {
        id: 'trust',
        title: 'Trust',
        quotes: [
          'Fireworks should not be going off in the woodland.',
          'They told us the buildings would not go that high.',
          'What are you doing here and why?'
        ]
      },
      {
        id: 'efficiency',
        title: 'Efficiency',
        quotes: [
          'There needs to be more indoor places to use in winter.',
          'There should be more affordable food places here.',
          'The swimming pool should be fixed properly.'
        ]
      }
    ];

    const engagements = [
      {
        value: 'belonging',
        title: 'Workshop 1.1, Polaroid value exercise',
        text: 'Dockland Settlement, Rotherhithe Station, the library, Burger King, and everyday objects like crisps became nodes of value through routine, family association, and shared use.'
      },
      {
        value: 'care',
        title: 'Workshop 1.2, Draw what you value',
        text: 'Children repeatedly drew home, school, park, railway, Surrey Docks Farm, library, River Thames, and friends, showing value as daily structure plus social attachment.'
      },
      {
        value: 'memory',
        title: 'Workshop 1.3, Lego block map',
        text: 'Surrey Quays Shopping Centre, Dockland Settlement, Redriff Primary, Stave Hill, the River, market, bowling, and cinema appeared as concentrated nodes, including remembered places lost to redevelopment.'
      },
      {
        value: 'neglect',
        title: 'Workshop 2, Add and remove',
        text: 'Repeated additions included youth spaces, gathering spaces, swimming pool, bowling, cinema, skate park, football pitch, indoor play, affordable food stalls, and more trees. Repeated removals included high-rises, unaffordable spaces, non-local venues, fireworks in the woodlands, and overbuilding.'
      },
      {
        value: 'trust',
        title: 'Workshop 3, Speak to British Land or Southwark Council',
        text: 'Participants raised gentrification, loss of history, lack of entertainment, poor connectivity, overbuilding, traffic, affordability, and mistrust. Requests included bringing back cinema and bowling, more playgrounds and parks, fixing the pool, and stopping the concrete jungle.'
      },
      {
        value: 'trust',
        title: 'Institutional and site engagements',
        text: 'Engagement nodes included Art of Isolation Store, Bow Art Studios, The Hithe, Brunel Museum, Sands Films Studios, London Bubble Theatre, Time & Talents, Deli Felice, Bizzie Bodies, Corner Corner, Dockland Settlement, Community Southwark, and British Land-related consultation spaces.'
      }
    ];

    let activeFilter = 'all';

    function renderValueMaps() {
      const filtered = activeFilter === 'all'
        ? valueMaps
        : valueMaps.filter(item => item.id === activeFilter);

      valueMapCards.innerHTML = filtered.map(item => `
        <div class="card">
          <h3>${item.title}</h3>
          <p>${item.quotes.join('\n\n')}</p>
        </div>
      `).join('');
    }

    function renderEngagements() {
      const filtered = activeFilter === 'all'
        ? engagements
        : engagements.filter(item => item.value === activeFilter);

      engagementList.innerHTML = filtered.map(item => `
        <div class="item">
          <strong>${item.title}</strong>
          <p>${item.text}</p>
        </div>
      `).join('');
    }

    chips.forEach(chip => {
      chip.addEventListener('click', () => {
        chips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        renderValueMaps();
        renderEngagements();
      });
    });

    renderValueMaps();
    renderEngagements();
  </script>
</body>
</html>
