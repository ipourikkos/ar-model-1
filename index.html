<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Value Maps AR</title>

  <!-- KEEPING YOUR ORIGINAL SCRIPT -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root {
      --bg: #ececec;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --text: #111;
      --muted: #666;
      --line: rgba(0, 0, 0, 0.08);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #ffffff 0%, #f3f3f3 45%, #e8e8e8 100%);
      color: var(--text);
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: transparent;
      --progress-bar-color: #111;
      --progress-mask: rgba(255,255,255,0.75);
    }

    .topbar {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      background: var(--panel);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .title-card {
      padding: 14px 16px;
      max-width: 340px;
    }

    .title-card h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .title-card p {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: white;
    }

    .btn:active {
      transform: translateY(0);
    }

    .bottom-ui {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: min(92vw, 520px);
      pointer-events: none;
    }

    .note {
      pointer-events: auto;
      background: rgba(17, 17, 17, 0.78);
      color: white;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      box-shadow: var(--shadow);
      max-width: 100%;
    }

    .feedback {
      pointer-events: auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px;
    }

    .feedback input {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.9);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      min-width: 0;
    }

    .feedback input:focus {
      border-color: rgba(0,0,0,0.2);
      background: white;
    }

    .feedback button {
      appearance: none;
      border: none;
      background: #111;
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .feedback button:hover {
      background: #000;
    }

    .status {
      pointer-events: auto;
      display: none;
      background: rgba(255,255,255,0.96);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--text);
      box-shadow: var(--shadow);
    }

    .hint-chip {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245, 245, 245, 0.82);
      backdrop-filter: blur(6px);
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-box {
      padding: 18px 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.95);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      text-align: center;
      min-width: 220px;
    }

    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 10px;
      border: 3px solid rgba(0,0,0,0.12);
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .loading-box p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .actions {
        justify-content: flex-start;
      }

      .title-card {
        max-width: none;
      }

      .feedback {
        grid-template-columns: 1fr;
      }

      .feedback button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-box">
      <div class="spinner"></div>
      <p>Loading 3D value map…</p>
    </div>
  </div>

  <model-viewer
    id="viewer"
    src="./model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    scale="0.01 0.01 0.01"
    alt="Interactive 3D community value map model">
  </model-viewer>

  <div class="topbar">
    <div class="panel title-card">
      <h1>Community Value Maps</h1>
      <p>Explore the 3D model, open it in AR, and leave your own experience or reflection.</p>
    </div>

    <div class="actions">
      <button class="btn" id="resetViewBtn" type="button">Reset View</button>
      <button class="btn" id="toggleRotateBtn" type="button">Pause Rotation</button>
      <button class="btn" id="fullscreenBtn" type="button">Fullscreen</button>
    </div>
  </div>

  <div class="bottom-ui">
    <div class="note">
      Open on phone, tap AR, then move your phone slowly to detect a surface.
    </div>

    <form id="feedbackForm" class="panel feedback">
      <input
        type="text"
        name="message"
        id="messageInput"
        placeholder="Leave a note, memory, or local experience..."
        maxlength="300"
        required
      />
      <button type="submit">Send</button>
    </form>

    <div class="status" id="statusMessage"></div>
  </div>

  <div class="panel hint-chip">
    Tip: drag to orbit, pinch to zoom
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const toggleRotateBtn = document.getElementById('toggleRotateBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const feedbackForm = document.getElementById('feedbackForm');
    const messageInput = document.getElementById('messageInput');
    const statusMessage = document.getElementById('statusMessage');

    let isRotating = true;

    viewer.addEventListener('load', () => {
      loadingOverlay.classList.add('hidden');
    });

    resetViewBtn.addEventListener('click', () => {
      viewer.cameraOrbit = '45deg 75deg auto';
      viewer.fieldOfView = '30deg';
      viewer.jumpCameraToGoal();
    });

    toggleRotateBtn.addEventListener('click', () => {
      isRotating = !isRotating;
      viewer.autoRotate = isRotating;
      toggleRotateBtn.textContent = isRotating ? 'Pause Rotation' : 'Start Rotation';
    });

    fullscreenBtn.addEventListener('click', async () => {
      const el = document.documentElement;
      if (!document.fullscreenElement) {
        await el.requestFullscreen?.();
      } else {
        await document.exitFullscreen?.();
      }
    });

    function showStatus(message, isError = false) {
      statusMessage.style.display = 'block';
      statusMessage.textContent = message;
      statusMessage.style.color = isError ? '#9b1c1c' : '#111';
      setTimeout(() => {
        statusMessage.style.display = 'none';
      }, 3500);
    }

    feedbackForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const message = messageInput.value.trim();
      if (!message) return;

      const formData = new FormData();
      formData.append('message', message);

      try {
        const response = await fetch('https://formspree.io/f/xwvwbgrg', {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          messageInput.value = '';
          showStatus('Thanks, your note was sent.');
        } else {
          showStatus('Could not send right now. Please try again.', true);
        }
      } catch (error) {
        showStatus('Connection problem. Please try again.', true);
      }
    });
  </script>
</body>
</html>
