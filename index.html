<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Value Lab</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root{
      --bg:#f2f2f2;
      --panel:#eaeaea;
      --text:#111;
      --muted:#666;
      --cyan:#5f8788;

      --care:#4f7c68;
      --neglect:#9b7a32;
      --greed:#6e3a3a;
      --belonging:#5f7d6d;
      --trust:#7b6332;
      --efficiency:#8a7a3a;
    }

    *{
      box-sizing:border-box;
    }

    html, body{
      margin:0;
      font-family:Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    model-viewer{
      width:100%;
      height:65vh;
      background:#fff;
    }

    .wrap{
      padding:16px;
      max-width:1100px;
      margin:auto;
    }

    h1{
      margin:0;
      font-size:32px;
      line-height:1;
    }

    p{
      margin:8px 0 16px;
      color:var(--muted);
      font-size:14px;
    }

    .controls{
      display:flex;
      gap:10px;
      margin-bottom:16px;
    }

    .main-btn{
      border:none;
      padding:12px 16px;
      border-radius:999px;
      cursor:pointer;
      font-weight:bold;
      background:black;
      color:white;
      font-size:14px;
    }

    .value-picker{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:10px;
      margin-bottom:12px;
    }

    .value-btn{
      border:none;
      padding:14px 16px;
      border-radius:16px;
      cursor:pointer;
      color:white;
      font-weight:bold;
      font-size:14px;
      text-transform:capitalize;
      opacity:0.72;
      transform:scale(1);
      transition:opacity .15s ease, transform .15s ease, box-shadow .15s ease;
      box-shadow:none;
    }

    .value-btn:hover{
      opacity:0.9;
    }

    .value-btn.active{
      opacity:1;
      transform:scale(1.02);
      box-shadow:0 10px 24px rgba(0,0,0,0.14);
      outline:3px solid rgba(0,0,0,0.08);
    }

    .care{background:var(--care);}
    .neglect{background:var(--neglect);}
    .greed{background:var(--greed);}
    .belonging{background:var(--belonging);}
    .trust{background:var(--trust);}
    .efficiency{background:var(--efficiency);}

    .selected-label{
      margin:4px 0 12px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }

    textarea{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid #ddd;
      margin-bottom:10px;
      font-size:14px;
      min-height:110px;
      resize:vertical;
      font-family:Arial, sans-serif;
    }

    .status{
      font-size:13px;
      color:var(--muted);
      margin-top:8px;
      min-height:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
      gap:12px;
      margin-top:22px;
    }

    .value{
      background:var(--panel);
      border-radius:16px;
      padding:12px;
    }

    .value h3{
      margin:0 0 10px;
      font-size:16px;
      text-transform:capitalize;
    }

    .entry{
      background:var(--cyan);
      color:white;
      padding:9px 10px;
      border-radius:10px;
      font-size:13px;
      margin-bottom:7px;
      line-height:1.35;
      word-break:break-word;
    }

    .empty{
      color:var(--muted);
      font-size:13px;
    }

    @media (max-width:700px){
      .value-picker{
        grid-template-columns:repeat(2, minmax(0,1fr));
      }

      model-viewer{
        height:58vh;
        min-height:340px;
      }
    }
  </style>
</head>
<body>

  <model-viewer
    id="viewer"
    src="./model.glb?v=4"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral">
  </model-viewer>

  <div class="wrap">
    <h1>Value Lab</h1>
    <p>Read the model, choose a value, then add your thought to that value.</p>

    <div class="controls">
      <button class="main-btn" id="arBtn">View in AR</button>
    </div>

    <div class="value-picker" id="valuePicker">
      <button class="value-btn care" data-value="care" type="button">Care</button>
      <button class="value-btn neglect" data-value="neglect" type="button">Neglect</button>
      <button class="value-btn greed" data-value="greed" type="button">Greed</button>
      <button class="value-btn belonging" data-value="belonging" type="button">Belonging</button>
      <button class="value-btn trust" data-value="trust" type="button">Trust</button>
      <button class="value-btn efficiency" data-value="efficiency" type="button">Efficiency</button>
    </div>

    <div class="selected-label" id="selectedLabel">No value selected</div>

    <textarea id="input" placeholder="Write your thought..." required></textarea>

    <button class="main-btn" id="send">Send</button>
    <div class="status" id="status"></div>

    <div class="grid" id="grid"></div>
  </div>

  <script>
    const viewer = document.getElementById("viewer");
    const arBtn = document.getElementById("arBtn");
    const send = document.getElementById("send");
    const input = document.getElementById("input");
    const grid = document.getElementById("grid");
    const status = document.getElementById("status");
    const valuePicker = document.getElementById("valuePicker");
    const selectedLabel = document.getElementById("selectedLabel");

    const STORAGE = "value-lab";
    const values = ["care","neglect","greed","belonging","trust","efficiency"];
    let selectedValue = "";

    function getData(){
      return JSON.parse(localStorage.getItem(STORAGE) || "[]");
    }

    function saveData(data){
      localStorage.setItem(STORAGE, JSON.stringify(data));
    }

    function render(){
      const data = getData();

      grid.innerHTML = values.map(v=>{
        const items = data.filter(d=>d.value===v);
        return `
          <div class="value">
            <h3>${v}</h3>
            ${
              items.length
                ? items.map(i=>`<div class="entry">${i.text}</div>`).join("")
                : `<div class="empty">No thoughts yet.</div>`
            }
          </div>
        `;
      }).join("");
    }

    function updateSelectedUI(){
      document.querySelectorAll(".value-btn").forEach(btn=>{
        btn.classList.toggle("active", btn.dataset.value === selectedValue);
      });

      selectedLabel.textContent = selectedValue
        ? `Selected value: ${selectedValue}`
        : "No value selected";
    }

    valuePicker.addEventListener("click", (e)=>{
      const btn = e.target.closest(".value-btn");
      if(!btn) return;
      selectedValue = btn.dataset.value;
      updateSelectedUI();
      status.textContent = "";
    });

    arBtn.onclick = async ()=>{
      try{
        if(viewer.activateAR) await viewer.activateAR();
      }catch{
        status.textContent = "AR could not open";
      }
    };

    send.onclick = async ()=>{
      const text = input.value.trim();

      if(!selectedValue){
        status.textContent = "Choose a value";
        return;
      }

      if(!text){
        status.textContent = "Write something";
        return;
      }

      const data = getData();
      data.push({ value:selectedValue, text });
      saveData(data);

      try{
        const formData = new FormData();
        formData.append("message", `[${selectedValue}] ${text}`);

        await fetch("https://formspree.io/f/xwvwbgrg", {
          method:"POST",
          body:formData,
          headers:{"Accept":"application/json"}
        });

        status.textContent = "Sent";
      }catch{
        status.textContent = "Saved locally";
      }

      input.value = "";
      render();
    };

    updateSelectedUI();
    render();
  </script>

</body>
</html>
