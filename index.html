<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Model</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f3f3f3;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #ffffff;
    }

    .note {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      z-index: 10;
      text-align: center;
    }
  </style>
</head>
<body>
  <model-viewer
    src="./model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
  >
  </model-viewer>

  <div class="note">
    Open on phone, tap the AR button, then move the phone to detect a surface.
  </div>
</body>
</html>
