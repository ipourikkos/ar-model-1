<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Value Maps AR</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

  <style>
    :root {
      --bg: #ececec;
      --panel: rgba(255, 255, 255, 0.9);
      --text: #111;
      --muted: #666;
      --line: rgba(0, 0, 0, 0.08);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      --radius: 16px;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #ffffff 0%, #f3f3f3 45%, #e8e8e8 100%);
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: transparent;
      --ar-button-display: none;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 20;
    }

    .title-card {
      padding: 14px 16px;
      max-width: 340px;
    }

    .title-card h1 {
      margin: 0 0 4px 0;
      font-size: 18px;
    }

    .title-card p {
      margin: 0;
      font-size: 13px;
      color: var(--muted);
    }

    .bottom-ui {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: min(92vw, 560px);
      align-items: center;
    }

    .ar-cta {
      border: none;
      background: #111;
      color: white;
      padding: 18px 28px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0,0,0,0.22);
    }

    .feedback {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px;
    }

    .feedback input {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
    }

    .feedback button {
      border: none;
      background: #111;
      color: white;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(245,245,245,0.85);
    }

    .loading-overlay.hidden {
      display: none;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(0,0,0,0.1);
      border-top-color: black;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <model-viewer
    id="viewer"
    src="./model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    scale="0.01 0.01 0.01">
  </model-viewer>

  <div class="topbar">
    <div class="panel title-card">
      <h1>Community Value Maps</h1>
      <p>Explore and contribute your experiences.</p>
    </div>
  </div>

  <div class="bottom-ui">
    <button class="ar-cta" id="arButton">View in AR</button>

    <form id="feedbackForm" class="panel feedback">
      <input type="text" id="messageInput" placeholder="Leave a note..." required>
      <button type="submit">Send</button>
    </form>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const arButton = document.getElementById('arButton');

    viewer.addEventListener('load', () => {
      loadingOverlay.classList.add('hidden');
    });

    arButton.addEventListener('click', async () => {
      if (viewer.activateAR) {
        await viewer.activateAR();
      }
    });

    document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const message = document.getElementById('messageInput').value;

      await fetch('https://formspree.io/f/xwvwbgrg', {
        method: 'POST',
        body: new FormData(e.target),
        headers: { 'Accept': 'application/json' }
      });

      e.target.reset();
    });
  </script>

</body>
</html>
